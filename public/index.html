<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong TCP</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .wrap {
      width: min(100%, 900px);
      background: #111827;
      border: 1px solid #243041;
      border-radius: 14px;
      padding: 16px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    h1 { margin: 0; font-size: 1.2rem; }
    .meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      color: #cbd5e1;
    }
    .pill {
      background: #0b1220;
      border: 1px solid #243041;
      border-radius: 999px;
      padding: 8px 12px;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #020617;
      border-radius: 10px;
      border: 1px solid #243041;
    }
    .bottom {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    button {
      width: fit-content;
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      background: #22d3ee;
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
    }
    .help, .status {
      color: #cbd5e1;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Pong Multiplayer TCP</h1>
      <div class="meta">
        <div class="pill">Você: <span id="role">conectando...</span></div>
        <div class="pill">Placar: <span id="score">0 x 0</span></div>
      </div>
    </div>

    <canvas id="game" width="800" height="450"></canvas>

    <div class="bottom">
      <button id="restartBtn">Reiniciar partida</button>
      <div class="help">Esquerda: W/S | Direita: ↑/↓</div>
      <div class="status" id="status">Conectando ao servidor...</div>
    </div>
  </div>

  <script src="./game.js"></script>
</body>
</html>
